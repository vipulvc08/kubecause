{{- if not .Values.pagerduty.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubecause.fullname" . }}-pagerduty
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecause.labels" . | nindent 4 }}
type: Opaque
stringData:
  webhook-secret: {{ required "pagerduty.webhookSecret is required (or set pagerduty.existingSecret)" .Values.pagerduty.webhookSecret | quote }}
  api-token: {{ .Values.pagerduty.apiToken | quote }}
{{- end }}
---
{{- if not .Values.llm.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubecause.fullname" . }}-llm
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecause.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ required "llm.apiKey is required (or set llm.existingSecret)" .Values.llm.apiKey | quote }}
{{- end }}
