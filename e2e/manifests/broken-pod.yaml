apiVersion: v1
kind: Namespace
metadata:
  name: e2e-broken
---
# A pod guaranteed to CrashLoopBackOff. Used as the target the agent
# investigates once real tool handlers are wired up.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashy
  namespace: e2e-broken
spec:
  replicas: 1
  selector:
    matchLabels: { app: crashy }
  template:
    metadata:
      labels: { app: crashy }
    spec:
      containers:
        - name: crashy
          image: busybox:1.36
          command: ["sh", "-c", "echo starting; sleep 2; echo simulated failure >&2; exit 1"]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { cpu: 50m, memory: 32Mi }
